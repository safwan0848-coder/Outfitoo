{% load static %}

<div class="h-full flex flex-col pt-4 md:pt-8 pb-10 px-3">

  <!-- Mobile inner header with user info + close button (Visible only on mobile) -->
  <div class="flex md:hidden items-center justify-between pb-4 mb-4 border-b border-white/10 px-2">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-gradient-to-br from-emerald-500 to-emerald-700 rounded-xl flex items-center justify-center shadow-lg">
        <span class="material-symbols-outlined text-white text-xl">manage_accounts</span>
      </div>
      <div>
        <div class="text-[14px] font-bold text-white leading-tight">My Account</div>
        <div class="text-[10px] text-emerald-400 font-bold uppercase tracking-wider mt-0.5">{{ request.user.username }}</div>
      </div>
    </div>
    <button onclick="window.closeSidebar()" class="w-9 h-9 rounded-xl bg-white/5 border border-white/10 text-gray-400 flex items-center justify-center hover:bg-red-500/15 hover:text-red-400 transition-colors focus:outline-none" aria-label="Close">
      <span class="material-symbols-outlined text-xl">close</span>
    </button>
  </div>

  <!-- GO BACK -->
  <a href="#" onclick="goBackOrHome(event)" class="sb-link">
    <span class="material-symbols-outlined">arrow_back</span>
    Go Back
  </a>

  <div class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] px-4 mt-6 mb-2">Navigation</div>

  <nav class="flex flex-col gap-1">
    <a href="{% url 'profile' %}"       class="sb-link {% if 'profile'  in request.path %}sb-active{% endif %}">
      <span class="material-symbols-outlined">person</span>Profile
    </a>
    <a href="{% url 'address-list' %}"  class="sb-link {% if 'address'  in request.path %}sb-active{% endif %}">
      <span class="material-symbols-outlined">location_on</span>Address
    </a>
    <a href="{% url 'order_list' %}"    class="sb-link {% if 'order'    in request.path %}sb-active{% endif %}">
      <span class="material-symbols-outlined">package_2</span>Orders
    </a>
    <a href="{% url 'wishlist_view' %}" class="sb-link {% if 'wishlist' in request.path %}sb-active{% endif %}">
      <span class="material-symbols-outlined">favorite</span>Wishlist
    </a>
    <a href="{% url 'wallet' %}"        class="sb-link {% if 'wallet'   in request.path %}sb-active{% endif %}">
      <span class="material-symbols-outlined">account_balance_wallet</span>Wallet
    </a>
  </nav>

</div>

<style>
  .sb-link {
    display: flex; 
    align-items: center; 
    gap: 14px;
    padding: 12px 16px; 
    border-radius: 14px;
    text-decoration: none; 
    font-size: 14px; 
    font-weight: 600;
    color: #9ca3af; 
    transition: all 0.2s ease;
  }
  .sb-link:hover { 
    background: rgba(255,255,255,0.05); 
    color: #ffffff; 
    transform: translateX(4px); 
  }
  .sb-active { 
    background: rgba(16,185,129,0.1) !important; 
    color: #10b981 !important; 
    border-right: 3px solid #10b981; 
    border-top-right-radius: 4px;
    border-bottom-right-radius: 4px;
    transform: none !important; 
  }
  .sb-link .material-symbols-outlined { 
    font-size: 22px; 
    flex-shrink: 0; 
  }
</style>

<script>
  function goBackOrHome(e) {
    e.preventDefault();
    if (document.referrer && document.referrer !== window.location.href) {
      window.history.back();
    } else {
      window.location.href = '/';
    }
  }
</script>
