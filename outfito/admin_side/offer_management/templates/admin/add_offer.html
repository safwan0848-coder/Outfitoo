<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Outfito | Add Offer</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Material+Icons+Outlined&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        cream:   { DEFAULT: '#faf8f4', 2: '#f3f0ea' },
        forest:  { DEFAULT: '#1a5c3a', mid: '#2a7a50', light: '#e8f4ee', dim: '#134a2c' },
        gold:    { DEFAULT: '#b18a4c', light: '#f5edd8', dim: '#8a6a36' },
        ink:     { DEFAULT: '#0e0e1a', 2: '#3a3a52', 3: '#7878a0', 4: '#a8a8c0' },
        surface: { DEFAULT: '#ffffff', 2: '#f8f6f1' },
      },
      fontFamily: {
        display: ['Cormorant Garamond', 'Georgia', 'serif'],
        body:    ['DM Sans', 'Helvetica Neue', 'sans-serif'],
      },
    },
  },
}
</script>
<style>
  body { font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
  .material-icons-outlined { vertical-align: middle; font-size: 19px; line-height: 1; }
  .form-input { 
    width: 100%; padding: 0.75rem 1rem; border-radius: 0.5rem; 
    border: 1px solid #e0dbd0; outline: none; background: #faf8f4;
  }
  .form-input:focus { border-color: #1a5c3a; box-shadow: 0 0 0 2px rgba(26,92,58,0.1); }
  .form-label { font-size: 0.8rem; font-weight: 600; color: #3a3a52; display: block; margin-bottom: 0.5rem; }
  .required { color: #e11d48; }
</style>
</head>

<body class="bg-[#fcfbf9] text-ink min-h-screen p-8">

<div class="max-w-[700px] mx-auto">
  <div class="mb-8">
    <a href="{% url 'offer_list' %}" class="text-ink-3 hover:text-ink font-semibold text-[14px] flex items-center gap-1"><span class="material-icons-outlined" style="font-size:16px">arrow_back</span> Back to Offers</a>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-[#e8e2d8] p-10">
    <h2 class="font-display text-[28px] font-bold text-center mb-8">Add Offer</h2>

    {% if messages %}
    <div class="mb-6">
      {% for message in messages %}
      <div class="p-4 mb-2 text-sm rounded-lg {% if message.tags == 'error' %}bg-red-100 text-red-700{% else %}bg-green-100 text-green-700{% endif %}">
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      
      <!-- Row 1: Offer Name -->
      <div class="mb-6">
        <label class="form-label">Offer Name <span class="required">*</span></label>
        <input type="text" name="offer_name" class="form-input" placeholder="e.g. Summer Special 2024" required>
      </div>

      <!-- Row 2: Discount Type & Apply To -->
      <div class="grid grid-cols-2 gap-8 mb-6">
        <div>
          <label class="form-label">Discount Type <span class="required">*</span></label>
          <div class="flex flex-col gap-3 mt-2">
            <label class="flex items-center gap-2 cursor-pointer text-[14px] font-medium text-ink-2">
              <input type="radio" name="discount_type" value="percentage" checked class="w-4 h-4 text-forest focus:ring-forest border-gray-300" onchange="toggleMaxDiscount()"> Percentage (%)
            </label>
            <label class="flex items-center gap-2 cursor-pointer text-[14px] font-medium text-ink-2">
              <input type="radio" name="discount_type" value="flat" class="w-4 h-4 text-forest focus:ring-forest border-gray-300" onchange="toggleMaxDiscount()"> Flat (₹)
            </label>
          </div>
        </div>
        <div>
          <label class="form-label">Apply To <span class="required">*</span></label>
          <div class="flex flex-col gap-3 mt-2">
            <label class="flex items-center gap-2 cursor-pointer text-[14px] font-medium text-ink-2">
              <input type="radio" name="apply_to" value="product" class="w-4 h-4 text-forest focus:ring-forest border-gray-300" onchange="toggleTargetSelect()"> Product
            </label>
            <label class="flex items-center gap-2 cursor-pointer text-[14px] font-medium text-ink-2">
              <input type="radio" name="apply_to" value="category" checked class="w-4 h-4 text-forest focus:ring-forest border-gray-300" onchange="toggleTargetSelect()"> Category
            </label>
          </div>
        </div>
      </div>

      <!-- Row 3: Select Product/Category & Discount Value -->
      <div class="grid grid-cols-2 gap-6 mb-6">
        <div>
          <label class="form-label" id="targetLabel">Select Category <span class="required">*</span></label>
          
          <!-- Category Select -->
          <select name="category_id" id="categorySelect" class="form-input">
            <option value="">Select Category</option>
            {% for c in categories %}
            <option value="{{ c.id }}">{{ c.category_name }}</option>
            {% endfor %}
          </select>

          <!-- Product Select -->
          <select name="product_id" id="productSelect" class="form-input hidden" disabled>
            <option value="">Select Product</option>
            {% for p in products %}
            <option value="{{ p.id }}">{{ p.name }}</option>
            {% endfor %}
          </select>
        </div>
        
        <div>
          <label class="form-label">Discount Value <span class="required">*</span></label>
          <input type="number" step="0.01" min="0.01" name="discount_value" class="form-input" placeholder="0.00" required>
        </div>
      </div>

      <!-- Row 4: Min Purchase & Max Discount -->
      <div class="grid grid-cols-2 gap-6 mb-6">
        <div>
          <label class="form-label">Minimum Purchase (₹)</label>
          <input type="number" step="0.01" min="0" name="minimum_purchase_amount" class="form-input" placeholder="0.00">
        </div>
        <div id="maxDiscountWrapper">
          <label class="form-label">Maximum Discount (₹)</label>
          <input type="number" step="0.01" min="0" name="maximum_discount_amount" id="maxDiscountInput" class="form-input" placeholder="0.00">
          <p class="text-[10px] text-ink-3 mt-1">*Set max discount amount for percentage offers</p>
        </div>
      </div>

      <!-- Row 5: Dates -->
      <div class="grid grid-cols-2 gap-6 mb-8">
        <div>
          <label class="form-label">Start Date <span class="required">*</span></label>
          <input type="date" name="start_date" class="form-input" required>
        </div>
        <div>
          <label class="form-label">End Date <span class="required">*</span></label>
          <input type="date" name="end_date" class="form-input" required>
        </div>
      </div>

      <!-- Row 6: Active Switch -->
      <div class="flex items-center justify-between p-4 bg-cream rounded-xl border border-[#e8e2d8] mb-8">
        <div>
          <h4 class="text-[14px] font-bold text-ink">Active</h4>
          <p class="text-[11px] text-ink-3">Enable this offer immediately</p>
        </div>
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" name="is_active" class="sr-only peer" checked>
          <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-forest"></div>
        </label>
      </div>

      <!-- Actions -->
      <div class="flex flex-col gap-3">
        <button type="submit" class="w-full bg-forest text-white font-bold py-3.5 rounded-xl hover:bg-forest-dim transition-colors text-[14px]">
          Save Offer
        </button>
        <a href="{% url 'offer_list' %}" class="w-full bg-[#e8e9eb] text-ink-2 font-bold py-3.5 rounded-xl hover:bg-[#d5d6d8] transition-colors text-[14px] text-center">
          Cancel
        </a>
      </div>

    </form>
  </div>
</div>

<script>
  function toggleTargetSelect() {
    const applyTo = document.querySelector('input[name="apply_to"]:checked').value;
    const catSelect = document.getElementById('categorySelect');
    const prodSelect = document.getElementById('productSelect');
    const targetLabel = document.getElementById('targetLabel');

    if (applyTo === 'category') {
      catSelect.classList.remove('hidden');
      catSelect.disabled = false;
      prodSelect.classList.add('hidden');
      prodSelect.disabled = true;
      targetLabel.innerHTML = 'Select Category <span class="required">*</span>';
    } else {
      catSelect.classList.add('hidden');
      catSelect.disabled = true;
      prodSelect.classList.remove('hidden');
      prodSelect.disabled = false;
      targetLabel.innerHTML = 'Select Product <span class="required">*</span>';
    }
  }

  function toggleMaxDiscount() {
    const type = document.querySelector('input[name="discount_type"]:checked').value;
    const maxWrap = document.getElementById('maxDiscountWrapper');
    const maxInput = document.getElementById('maxDiscountInput');

    if (type === 'flat') {
      maxWrap.style.opacity = '0.4';
      maxInput.disabled = true;
      maxInput.value = '';
    } else {
      maxWrap.style.opacity = '1';
      maxInput.disabled = false;
    }
  }

  // Initialize
  toggleTargetSelect();
  toggleMaxDiscount();
</script>
</body>
</html>
