{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Outfito | Add Category</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#fafaf9;
color:#292524;
}

/* Sidebar */

.sidebar{
width:260px;
height:100vh;
position:fixed;
background:#f5f5f4;
border-right:1px solid #e5e5e5;
padding:30px 20px;
}

.logo{
font-family:'Playfair Display',serif;
font-size:28px;
font-weight:700;
color:#064e3b;
}

.sidebar a{
display:block;
padding:12px 15px;
margin-bottom:8px;
text-decoration:none;
color:#57534e;
font-weight:500;
border-radius:8px;
transition:.2s;
}

.sidebar a:hover{
background:#e7e5e4;
color:#1c1917;
}

.sidebar .active{
background:#064e3b;
color:white;
box-shadow:0 4px 6px rgba(6,78,59,.2);
}

/* Main */

.main{
margin-left:260px;
padding:40px;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

.form-container{
width:100%;
max-width:650px;
}

/* Card */

.card-box{
border-radius:20px;
border:1px solid #e7e5e4;
background:#fff;
box-shadow:0 12px 30px rgba(0,0,0,.05);
}

/* Inputs */

.form-control{
padding:12px 16px;
border-radius:10px;
border:1px solid #d6d3d1;
transition:.2s;
}

.form-control:focus{
border-color:#064e3b;
box-shadow:0 0 0 4px rgba(6,78,59,.08);
}

/* Upload Area */

.upload-area{
border:2px dashed #d6d3d1;
border-radius:12px;
padding:30px 20px;
text-align:center;
background:#fafaf9;
cursor:pointer;
transition:.2s;
}

.upload-area:hover{
border-color:#064e3b;
background:#f0fdf4;
}

.upload-icon{
width:48px;
height:48px;
color:#064e3b;
margin-bottom:12px;
}

#imagePreview{
max-width:100%;
max-height:250px;
border-radius:8px;
object-fit:cover;
display:none;
margin:auto;
}

/* Premium Toggle */

.premium-toggle{
display:flex;
align-items:center;
gap:12px;
}

.premium-toggle input{
display:none;
}

.toggle-label{
width:52px;
height:26px;
background:#d6d3d1;
border-radius:50px;
position:relative;
cursor:pointer;
transition:.25s;
}

.toggle-circle{
width:22px;
height:22px;
background:white;
border-radius:50%;
position:absolute;
top:2px;
left:2px;
transition:.25s;
box-shadow:0 2px 6px rgba(0,0,0,.2);
}

.premium-toggle input:checked + .toggle-label{
background:#064e3b;
box-shadow:0 0 0 4px rgba(6,78,59,.1);
}

.premium-toggle input:checked + .toggle-label .toggle-circle{
transform:translateX(26px);
}

.toggle-text{
font-weight:500;
color:#44403c;
}

/* Buttons */

.btn{
padding:12px 24px;
border-radius:10px;
font-weight:500;
}

.btn-primary{
background:#064e3b;
border:none;
box-shadow:0 4px 8px rgba(6,78,59,.25);
}

.btn-primary:hover{
background:#042f23;
}

.btn-secondary{
background:#f5f5f4;
border:1px solid #d6d3d1;
color:#44403c;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo mb-5">Outfito</div>

<a href="#">Dashboard</a>
<a href="#">Orders</a>
<a href="#">Products</a>
<a class="active" href="#">Categories</a>
<a href="#">Coupons</a>
<a href="#">Offers</a>
<a href="#">Customers</a>

</div>

<div class="main">

<h3 class="fw-bold mb-4">Add Category</h3>

{% if messages %}
{% for message in messages %}

<div class="alert alert-{{message.tags}} alert-dismissible fade show shadow-sm" style="max-width:600px;">
{{message}}
<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

{% endfor %}
{% endif %}

<div class="form-container">

<div class="card card-box p-4">

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="mb-4">

<label class="form-label fw-semibold">Category Name</label>

<input
type="text"
name="category_name"
class="form-control"
placeholder="Example: Evening Wear"
required>

</div>

<div class="mb-4">

<label class="form-label fw-semibold">Category Description</label>

<textarea
name="description"
rows="3"
class="form-control"
placeholder="Write category description..."></textarea>

</div>

<div class="mb-4">

<label class="form-label fw-semibold">Category Image</label>

<label for="imageInput" class="upload-area d-block">

<input
type="file"
name="image"
id="imageInput"
class="d-none"
accept="image/*"
required>

<div id="uploadPlaceholder">

<svg xmlns="http://www.w3.org/2000/svg"
class="upload-icon"
fill="none"
viewBox="0 0 24 24"
stroke="currentColor">

<path stroke-linecap="round"
stroke-linejoin="round"
stroke-width="2"
d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>

</svg>

<h6 class="mb-1">Click to upload image</h6>
<p class="text-muted small mb-0">PNG, JPG, GIF</p>

</div>

<img id="imagePreview">

</label>

</div>

<div class="mb-5">

<label class="form-label d-block mb-3">Category Status</label>

<div class="premium-toggle">

<input
type="checkbox"
name="is_active"
id="activeToggle"
checked>

<label for="activeToggle" class="toggle-label">
<span class="toggle-circle"></span>
</label>

<span class="toggle-text" id="statusText">
Active Category
</span>

</div>

</div>

<div class="d-flex gap-3">

<button type="submit" class="btn btn-primary w-50">
Save Category
</button>

<button type="reset" class="btn btn-secondary w-50" id="resetBtn">
Cancel
</button>

</div>

</form>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const imageInput=document.getElementById('imageInput');
const imagePreview=document.getElementById('imagePreview');
const uploadPlaceholder=document.getElementById('uploadPlaceholder');
const resetBtn=document.getElementById('resetBtn');

imageInput.addEventListener('change',function(e){

const file=e.target.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){

imagePreview.src=e.target.result;
imagePreview.style.display='block';
uploadPlaceholder.style.display='none';

}

reader.readAsDataURL(file);

}

});

resetBtn.addEventListener('click',function(){

imagePreview.style.display='none';
uploadPlaceholder.style.display='block';

});

const toggle=document.getElementById("activeToggle");
const statusText=document.getElementById("statusText");

toggle.addEventListener("change",function(){

if(toggle.checked){
statusText.textContent="Active Category";
}else{
statusText.textContent="Inactive Category";
}

});

</script>

</body>
</html>
