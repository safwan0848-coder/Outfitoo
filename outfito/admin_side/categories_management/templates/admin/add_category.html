{% extends 'admin_base.html' %}

{% block title %}Outfito | Add Category{% endblock %}

{% block extra_head %}
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .form-container { width:100%; max-width:700px; margin:0 auto; }
  .card-box { border-radius:20px; border:1px solid var(--border); background:var(--card-bg); box-shadow:0 12px 30px rgba(0,0,0,.05); }
  .form-control { width:100%; padding:12px 16px; border-radius:10px; border:1px solid var(--border); background:var(--bg); color:var(--text); transition:.2s; font-family:var(--font-body); box-sizing:border-box; }
  .form-control:focus { border-color:var(--primary); box-shadow:0 0 0 4px rgba(6,78,59,.08); outline:none; }
  .upload-area { border:2px dashed var(--border); border-radius:12px; padding:30px 20px; text-align:center; background:var(--bg); cursor:pointer; transition:.2s; display:block; }
  .upload-area:hover { border-color:var(--primary); background:var(--primary-light); }
  .upload-icon { width:48px; height:48px; color:var(--primary); margin-bottom:12px; }
  #imagePreview { max-width:100%; max-height:250px; border-radius:8px; object-fit:cover; display:none; margin:auto; }
  .premium-toggle { display:flex; align-items:center; gap:12px; }
  .premium-toggle input { display:none; }
  .toggle-label { width:52px; height:26px; background:var(--border); border-radius:50px; position:relative; cursor:pointer; transition:.25s; }
  .toggle-circle { width:22px; height:22px; background:white; border-radius:50%; position:absolute; top:2px; left:2px; transition:.25s; box-shadow:0 2px 6px rgba(0,0,0,.2); }
  .premium-toggle input:checked + .toggle-label { background:var(--primary); }
  .premium-toggle input:checked + .toggle-label .toggle-circle { transform:translateX(26px); }
  .toggle-text { font-weight:500; color:var(--text-muted); }
  .btn-submit { padding:12px 24px; border-radius:10px; font-weight:500; background:var(--primary); border:none; color:#fff; box-shadow:0 4px 8px rgba(6,78,59,.25); cursor:pointer; transition:background var(--tr); font-family:var(--font-body); width:100%; }
  .btn-submit:hover { background:var(--primary-hover); }
  .btn-reset { padding:12px 24px; border-radius:10px; font-weight:500; background:var(--sidebar-bg); border:1px solid var(--border); color:var(--text); font-family:var(--font-body); cursor:pointer; width:100%; }
  .page-title-sm { font-family:var(--font-display); font-size:2rem; font-weight:700; color:var(--text); margin-bottom:1.5rem; }
  .form-label { display:block; font-weight:600; margin-bottom:0.5rem; font-size:0.875rem; color:var(--text); }
  .mb-4 { margin-bottom:1rem; }
  .mb-5 { margin-bottom:1.25rem; }
</style>
{% endblock %}

{% block content %}
<h3 class="page-title-sm">Add Category</h3>



<div class="form-container">
  <div class="card-box p-4">
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="mb-4">
        <label class="form-label fw-semibold">Category Name</label>
        <input type="text" name="category_name" class="form-control" placeholder="Example: Evening Wear" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Category Description</label>
        <textarea name="description" rows="3" class="form-control" placeholder="Write category description..."></textarea>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Category Image</label>
        <label for="imageInput" class="upload-area d-block">
          <input type="file" name="image" id="imageInput" class="d-none" accept="image/*" required>
          <div id="uploadPlaceholder">
            <svg xmlns="http://www.w3.org/2000/svg" class="upload-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
            </svg>
            <h6 class="mb-1">Click to upload image</h6>
            <p class="text-muted small mb-0">PNG, JPG, GIF</p>
          </div>
          <img id="imagePreview">
        </label>
      </div>
      <div class="mb-5">
        <label class="form-label d-block mb-3">Category Status</label>
        <div class="premium-toggle">
          <input type="checkbox" name="is_active" id="activeToggle" checked>
          <label for="activeToggle" class="toggle-label"><span class="toggle-circle"></span></label>
          <span class="toggle-text" id="statusText">Active Category</span>
        </div>
      </div>
      <div class="flex flex-col sm:flex-row gap-3 mt-2">
        <button type="submit" class="btn-submit">Save Category</button>
        <button type="reset" class="btn-reset" id="resetBtn">Cancel</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const imageInput = document.getElementById('imageInput');
const imagePreview = document.getElementById('imagePreview');
const uploadPlaceholder = document.getElementById('uploadPlaceholder');
const resetBtn = document.getElementById('resetBtn');
imageInput.addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) { imagePreview.src = e.target.result; imagePreview.style.display = 'block'; uploadPlaceholder.style.display = 'none'; };
    reader.readAsDataURL(file);
  }
});
resetBtn.addEventListener('click', function() { imagePreview.style.display = 'none'; uploadPlaceholder.style.display = 'block'; });
const toggle = document.getElementById("activeToggle");
const statusText = document.getElementById("statusText");
toggle.addEventListener("change", function() { statusText.textContent = toggle.checked ? "Active Category" : "Inactive Category"; });
</script>
{% endblock %}
