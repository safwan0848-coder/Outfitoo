{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outfito | OTP Verification</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Manrope',sans-serif;
background:#0a0f1a;
color:#fff;
min-height:100vh;
overflow:hidden;
}

.left-section{
position:relative;
height:100vh;
overflow:hidden;
}

.left-section img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
transform:scale(1.05);
}

.image-overlay{
position:absolute;
inset:0;
background:linear-gradient(to bottom, rgba(10,15,26,0.2), rgba(10,15,26,0.85));
}

.right-section{
background:#0a0f1a;
position:relative;
}

.radial-glow{
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle, rgba(13,89,242,0.15) 0%, transparent 70%);
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
filter:blur(80px);
}

.glass-card{
background: rgba(16,22,34,0.5);
backdrop-filter: blur(14px);
border:1px solid rgba(255,255,255,0.08);
border-radius:30px;
padding:40px;
width:100%;
max-width:480px;
}

.icon-box{
width:70px;
height:70px;
border-radius:20px;
background:rgba(13,89,242,0.1);
border:1px solid rgba(13,89,242,0.4);
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:#0d59f2;
margin-bottom:25px;
}

.otp-input{
width:100%;
height:75px;
text-align:center;
font-size:32px;
font-weight:700;
background:#101622;
border:2px solid #1f2937;
border-radius:18px;
color:#fff;
}

.otp-input:focus{
border-color:#0d59f2;
box-shadow:0 0 15px rgba(13,89,242,.4);
outline:none;
}

.btn-primary{
background:#0d59f2;
border:none;
padding:18px;
font-weight:700;
border-radius:18px;
}

.btn-primary:hover{
background:#0949c9;
}

.resend-link{
color:#0d59f2;
font-weight:700;
text-decoration:none;
}

.timer-box{
background:rgba(0,255,255,.08);
border:1px solid rgba(0,255,255,.2);
padding:8px 18px;
border-radius:50px;
font-weight:700;
font-size:14px;
color:#00e5ff;
}

</style>
</head>

<body>

<div class="container-fluid">
<div class="row vh-100">

<div class="col-lg-6 d-none d-lg-block left-section p-0">

<img src="{% static 'images/Signup.jpeg' %}">

<div class="image-overlay"></div>

</div>

<div class="col-lg-6 d-flex align-items-center justify-content-center right-section">

<div class="radial-glow"></div>

<div class="glass-card text-center">

<div class="icon-box mx-auto">✔</div>

<h2 class="fw-bold mb-3">Verify OTP</h2>

<p class="text-secondary mb-4">
We sent a 6-digit code to your email <br>
<span class="text-primary fw-bold">{{ email }}</span>
</p>

{% if messages %}
{% for message in messages %}
<div class="alert alert-{{ message.tags }}">
{{ message }}
</div>
{% endfor %}
{% endif %}

<form method="POST">

{% csrf_token %}

<input type="hidden" name="otp" id="final_otp">

<div class="row g-2 mb-4">

<div class="col-2"><input type="text" maxlength="1" class="otp-input otp-box"></div>
<div class="col-2"><input type="text" maxlength="1" class="otp-input otp-box"></div>
<div class="col-2"><input type="text" maxlength="1" class="otp-input otp-box"></div>
<div class="col-2"><input type="text" maxlength="1" class="otp-input otp-box"></div>
<div class="col-2"><input type="text" maxlength="1" class="otp-input otp-box"></div>
<div class="col-2"><input type="text" maxlength="1" class="otp-input otp-box"></div>

</div>

<button type="submit" class="btn btn-primary w-100">
Verify & Proceed →
</button>

</form>

<div class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-3">

<p class="text-secondary mb-0">
Didn't receive the code?
<a href="{% url 'resend-profile-otp' %}" class="resend-link">Resend</a>
</p>

<div class="timer-box">
⏱ <span id="timer"></span>
</div>

</div>

</div>
</div>

</div>
</div>

<script>

const inputs = document.querySelectorAll(".otp-box");
const hiddenInput = document.getElementById("final_otp");

inputs.forEach((input, index) => {

input.addEventListener("input", () => {

input.value = input.value.replace(/[^0-9]/g, "");

if(input.value.length === 1 && index < inputs.length-1){
inputs[index+1].focus();
}

let otp="";
inputs.forEach(i => otp += i.value);

hiddenInput.value = otp;

});

input.addEventListener("keydown", (e)=>{

if(e.key==="Backspace" && input.value==="" && index>0){
inputs[index-1].focus();
}

});

});

let time = {{ remaining_seconds|default:0 }};
const timer = document.getElementById("timer");

function updateTimer(){

if(time <= 0){
timer.textContent="00:00";
return;
}

let minutes = Math.floor(time/60);
let seconds = time%60;

seconds = seconds<10 ? "0"+seconds : seconds;
minutes = minutes<10 ? "0"+minutes : minutes;

timer.textContent = minutes + ":" + seconds;

time--;

}

updateTimer();

setInterval(updateTimer,1000);

</script>

</body>
</html>
