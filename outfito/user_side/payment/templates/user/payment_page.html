{% extends 'base.html' %}
{% load static %}

{% block title %}Secure Payment – OUTFITO{% endblock %}

{% block content %}
<style>
    :root {
        --primary: #10b981;
        --primary-dark: #059669;
        --bg: #0a0e1a;
        --card-bg: #0f172a;
        --text-main: #ffffff;
        --text-muted: #94a3b8;
        --border: rgba(255, 255, 255, 0.1);
    }

    .payment-wrapper {
        min-height: calc(100vh - 64px);
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        font-family: 'Inter', sans-serif;
    }

    .payment-card {
        background: var(--card-bg);
        width: 100%;
        max-width: 480px;
        border-radius: 24px;
        border: 1px solid var(--border);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        position: relative;
    }

    .payment-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--primary), var(--primary-dark));
    }

    .card-content {
        padding: 40px;
    }

    .brand-section {
        text-align: center;
        margin-bottom: 32px;
    }

    .brand-logo {
        width: 48px;
        height: 48px;
        background: #fff;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2);
    }

    .brand-logo img {
        width: 32px;
        height: 32px;
        object-fit: contain;
    }

    .brand-name {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--text-main);
        letter-spacing: 0.05em;
        text-transform: uppercase;
    }

    .order-summary {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 32px;
    }

    .summary-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
    }

    .summary-label {
        font-size: 0.875rem;
        color: var(--text-muted);
    }

    .summary-value {
        font-size: 1rem;
        font-weight: 600;
        color: var(--text-main);
    }

    .total-amount {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
    }

    .total-label {
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--primary);
        text-transform: uppercase;
        letter-spacing: 0.1em;
    }

    .total-value {
        font-size: 2.5rem;
        font-weight: 800;
        color: var(--text-main);
        letter-spacing: -0.02em;
    }

    .total-value span {
        font-size: 1.5rem;
        color: var(--primary);
        margin-right: 4px;
    }

    .action-section {
        text-align: center;
    }

    .pay-button {
        width: 100%;
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        color: white;
        border: none;
        border-radius: 16px;
        padding: 20px;
        font-size: 1.125rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
    }

    .pay-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 20px 25px -5px rgba(16, 185, 129, 0.4);
    }

    .pay-button:active {
        transform: translateY(0);
    }

    .pay-button:disabled {
        background: #1e293b;
        color: #475569;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
    }

    .secure-badge {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 24px;
        font-size: 0.75rem;
        color: var(--text-muted);
    }

    .secure-badge i {
        color: var(--primary);
    }

    /* Ambient background effects */
    .ambient-glow {
        position: absolute;
        width: 300px;
        height: 300px;
        background: var(--primary);
        filter: blur(120px);
        opacity: 0.1;
        z-index: 0;
        pointer-events: none;
    }

    .glow-1 { top: -150px; right: -150px; }
    .glow-2 { bottom: -150px; left: -150px; }

</style>

<div class="payment-wrapper">
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div class="payment-card">
        <div class="card-content">
            <div class="brand-section">
                <div class="brand-logo">
                    <img src="{% static 'images/outfito.png' %}" alt="OUTFITO">
                </div>
                <div class="brand-name">OUTFITO</div>
            </div>

            <div class="order-summary">
                <div class="summary-row">
                    <span class="summary-label">Customer</span>
                    <span class="summary-value">{{ request.user.username }}</span>
                </div>
                <div class="summary-row">
                    <span class="summary-label">Payment via</span>
                    <span class="summary-value">Razorpay</span>
                </div>

                <div class="total-amount">
                    <div class="total-label">Amount Payable</div>
                    <div class="total-value"><span>₹</span>{{ total_display }}</div>
                </div>
            </div>

            <div class="action-section">
                <button id="rzp-button1" class="pay-button">
                    <i class="fa-solid fa-shield-check"></i>
                    Pay Now via Razorpay
                </button>

                <div class="secure-badge">
                    <i class="fa-solid fa-lock"></i>
                    Secure, 256-bit encrypted checkout
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    document.getElementById('rzp-button1').onclick = function(e){
        e.preventDefault();

        var btn = this;
        var originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Initializing...';
        btn.disabled = true;

        var options = {
            "key":         "{{ razorpay_key }}",
            "amount":      "{{ amount }}",          // in paise
            "currency":    "INR",
            "name":        "OUTFITO",
            "description": "Secure Checkout",
            "image":       "{% static 'images/outfito.png' %}",
            "order_id":    "{{ razorpay_order_id }}",

            // ── SUCCESS handler ──────────────────────────────────────
            "handler": function (response) {
                // Build and POST the verification form
                var form = document.createElement("form");
                form.setAttribute("method", "POST");
                // No order_id in URL — order is created inside verify_payment
                form.setAttribute("action", "{% url 'verify_payment' %}");

                var fields = {
                    "csrfmiddlewaretoken":  "{{ csrf_token }}",
                    "razorpay_payment_id":  response.razorpay_payment_id,
                    "razorpay_order_id":    response.razorpay_order_id,
                    "razorpay_signature":   response.razorpay_signature
                };

                for (var key in fields) {
                    var input = document.createElement("input");
                    input.setAttribute("type", "hidden");
                    input.setAttribute("name", key);
                    input.setAttribute("value", fields[key]);
                    form.appendChild(input);
                }

                document.body.appendChild(form);
                form.submit();
            },

            "prefill": {
                "name":    "{{ request.user.get_full_name|default:request.user.username }}",
                "email":   "{{ request.user.email }}",
                "contact": "9999999999"
            },
            "theme": {
                "color": "#10b981"
            },

            // ── DISMISS handler (user closed the modal) ──────────────
            "modal": {
                "ondismiss": function() {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            }
        };

        try {
            var rzp = new Razorpay(options);

            // ── FAILURE handler (card declined / timeout etc.) ───────
            rzp.on('payment.failed', function (response) {
                // Cart is untouched; no order was created. Go to failed page.
                window.location.href = "{% url 'payment_failed' %}";
            });

            rzp.open();

            // Reset button if modal silently fails to launch
            setTimeout(function() {
                if (btn.disabled) {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            }, 3000);

        } catch (error) {
            console.error("Razorpay Error:", error);
            alert("Payment gateway failed to load. Please refresh and try again.");
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }
</script>
{% endblock %}
